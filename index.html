<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystic Woods Survivors</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="mainMenu">
  <div class="menu-content">
    <div class="menu-title">MYSTIC WOODS</div>
    <div class="menu-subtitle">SURVIVORS</div>
    <div class="menu-divider"></div>
    <button class="menu-btn start-btn" onclick="startGame()">НАЧАТЬ ИГРУ</button>
    <button class="menu-btn" id="metaUpgradeBtn">УЛУЧШЕНИЯ</button>
    <div class="menu-version">v1.0</div>
  </div>
</div>


<div id="upgradeOverlay"></div>
<div id="loadingScreen">
  <div class="loading-content">
    <div class="loading-title">MYSTIC WOODS</div>
    <div class="loading-subtitle">SURVIVORS</div>
    <div class="loading-bar-container">
      <div class="loading-bar" id="loadingBar"></div>
    </div>
    <div class="loading-text" id="loadingProgress">0%</div>
  </div>
</div>
<audio id="menuMusic" src="menu.mp3" loop></audio>
<audio id="gameplayMusic" src="menu.mp3" loop></audio>
<audio id="rageMusic" src="make.mp3" loop></audio>
<script src="player.js"></script>
<script src="touch.js"></script>
<script src="audio.js"></script>
<script src="enemy.js"></script>
<script src="spawner.js"></script>
<script src="weapon.js"></script>
<script src="passives.js"></script>
<script src="save.js"></script>
<script src="ui.js"></script>
<script src="game.js"></script>
<script src="script.js"></script>
</body>
</html>
